<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <title>Кружок</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="bar">
        <h1 class="title">Случайный кружок</h1>
        <p class="hint">
          До 60 сек · 1 отправка = 5 просмотров чужих кружков
        </p>
        <div class="stats">
          <span class="badge" id="creditsLabel">Просмотры: 0</span>
        </div>
      </header>

      <section class="stage">
        <div class="circle-stack">
          <div class="circle-wrap" id="circleWrap">
            <video class="circle-video" id="preview" playsinline muted autoplay></video>
            <video class="circle-video hidden" id="playback" playsinline></video>
            <div class="record-ring" id="recordRing" aria-hidden="true"></div>
          </div>
          <div class="timer" id="timer" aria-live="polite">0:00</div>
        </div>

        <p class="status" id="status"></p>

        <div class="controls">
          <button type="button" class="btn-record" id="btnRecord" aria-label="Запись">
            <span class="btn-record-inner" id="btnRecordInner"></span>
          </button>
        </div>

        <div id="captchaMount" class="captcha-mount" aria-hidden="true"></div>

        <div class="row">
          <button type="button" class="btn secondary" id="btnWatch" disabled>
            Случайный чужой кружок
          </button>
        </div>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
